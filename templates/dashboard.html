<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Dashboard</title>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='dashboard.css') }}">
    </head>
<body>
    <br>
    <font class="title" size="42">Dashboard</font><br>
    <br>

<form method="POST" action="/abort">
    <button style="height: 50px; width: 300px" type="submit">
        <font size="5">Activate FTS</font>
    </button>
</form>
<br>
<form method="POST" action="/gear">
    <button style="height: 50px; width: 300px" type="submit">
        <font size="5">Toggle Landing Gear</font>
    </button>
</form>

<div class="s1-telemetry slide-down">
    <div class="s1-telemetry-header">
        <p>Stage 1 Telemetry</p>
    </div>
    <div class="s1-telemetry-box">
        <p class="s1-altitude">
            <span class="left-text">Altitude</span>
            <span class="right-text" id="s1-altitude">0 m</span>
        </p>
        <p class="s1-heading">
            <span class="left-text">Heading</span>
            <span class="right-text" id="s1-heading">0*</span>
        </p>
        <p class="s1-pitch">
            <span class="left-text">Pitch</span>
            <span class="right-text" id="s1-pitch">0*</span>
        </p>
        <p class="s1-gforce">
            <span class="left-text">Gforce</span>
            <span class="right-text" id="s1-gforce">0 g</span>
        </p>
    </div>
    <div class="s1-telemetry-state">
        <p class="s1-state">
            <span class="left-text">State</span>
            <span class="right-text" id="s1-state">TBD</span>
        </p>
    </div>
</div>

<div class="s1-engines">
    <div class="s1-engine-outline fade-in"></div>
    <button class="s1-e7 s1-engine fade-in">7</button>
    <button class="s1-e1 s1-engine fade-in">1</button>
    <button class="s1-e2 s1-engine fade-in">2</button>
    <button class="s1-e3 s1-engine fade-in">3</button>
    <button class="s1-e4 s1-engine fade-in">4</button>
    <button class="s1-e5 s1-engine fade-in">5</button>
    <button class="s1-e6 s1-engine fade-in">6</button>
</div>

<div class="s2-telemetry slide-down">
    <div class="s2-telemetry-header">
        <p>Stage 2 Telemetry</p>
    </div>
    <div class="s2-telemetry-box">
        <p class="s2-altitude">
            <span class="left-text">Altitude</span>
            <span class="right-text" id="s2-altitude">0 m</span>
        </p>
        <p class="s2-heading">
            <span class="left-text">Heading</span>
            <span class="right-text" id="s2-heading">0*</span>
        </p>
        <p class="s2-pitch">
            <span class="left-text">Pitch</span>
            <span class="right-text" id="s2-pitch">0*</span>
        </p>
        <p class="s2-gforce">
            <span class="left-text">Gforce</span>
            <span class="right-text" id="s2-gforce">0 g</span>
        </p>
    </div>
    <div class="s2-telemetry-state">
        <p class="s2-state">
            <span class="left-text">State</span>
            <span class="right-text" id="s2-state">TBD</span>
        </p>
    </div>
</div>

<script>

async function updateTelemetry() {

    const response = await fetch("/telemetry");
    const data = await response.json();

    document.getElementById("s1-altitude").textContent =
        data.altitude.toFixed(0) + " m";

    document.getElementById("s1-heading").textContent =
        data.heading.toFixed(3) + "*";

    document.getElementById("s1-pitch").textContent =
        data.pitch.toFixed(3) + "*";

    document.getElementById("s1-gforce").textContent =
        data.gforce.toFixed(6) + " g";
}

setInterval(updateTelemetry, 0);

// Run immediately on page load
updateTelemetry();

async function runSlideDownAnimation() {
    const elements = document.querySelectorAll('.slide-down');

    elements.forEach(element => {
        element.classList.add('slide-down-animation');
    });
}

async function runFadeInAnimation() {
    const elements = document.querySelectorAll('.fade-in');

    elements.forEach(element => {
        element.classList.add('fade-in-animation');
    });
}

if ("{{ animate }}" == "True") {
    runSlideDownAnimation();
    runFadeInAnimation();
}

</script>
</body>
</html>
