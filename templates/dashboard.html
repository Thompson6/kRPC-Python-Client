<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Dashboard</title>
        <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='dashboard.css') }}">
    </head>
<body>
    <br>
    <font class="title" size="42">Dashboard</font><br>
    <br>

<div class="s1-telemetry slide-down">
    <div class="s1-telemetry-header">
        <p>Stage 1 Telemetry</p>
    </div>
    <div class="s1-telemetry-box">
        <p class="s1-altitude">
            <span class="left-text">Altitude</span>
            <span class="right-text" id="s1-altitude">0 m</span>
        </p>
        <p class="s1-heading">
            <span class="left-text">Heading</span>
            <span class="right-text" id="s1-heading">0*</span>
        </p>
        <p class="s1-pitch">
            <span class="left-text">Pitch</span>
            <span class="right-text" id="s1-pitch">0*</span>
        </p>
        <p class="s1-gforce">
            <span class="left-text">Gforce</span>
            <span class="right-text" id="s1-gforce">0 g</span>
        </p>
    </div>
    <div class="s1-telemetry-state">
        <p class="s1-state">
            <span class="left-text">State</span>
            <span class="right-text" id="s1-state">TBD</span>
        </p>
    </div>
    <form method="POST" action="/abort">
        <button class="s1-fts" type="submit">
            <font>FTS</font>
        </button>
    </form>
    <form method="POST" action="/gear">
        <button class="s1-gear" type="submit">
            <font>Gear</font>
        </button>
    </form>
</div>

<div class="s1-engines">
    <div class="s1-engine-outline fade-in"></div>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=1) }}' ; " class="s1-e1 s1-engine fade-in" id="1">1</button>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=2) }}' ; " class="s1-e2 s1-engine fade-in" id="2">2</button>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=3) }}' ; " class="s1-e3 s1-engine fade-in" id="3">3</button>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=4) }}' ; " class="s1-e4 s1-engine fade-in" id="4">4</button>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=5) }}' ; " class="s1-e5 s1-engine fade-in" id="5">5</button>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=6) }}' ; " class="s1-e6 s1-engine fade-in" id="6">6</button>
    <button onclick="window.location.href = '{{ url_for('engine_page', stage=1, engine_number=7) }}' ; " class="s1-e7 s1-engine fade-in" id="7">7</button>
</div>

<div class="s2-telemetry slide-down">
    <div class="s2-telemetry-header">
        <p>Stage 2 Telemetry</p>
    </div>
    <div class="s2-telemetry-box">
        <p class="s2-altitude">
            <span class="left-text">Altitude</span>
            <span class="right-text" id="s2-altitude">0 m</span>
        </p>
        <p class="s2-heading">
            <span class="left-text">Heading</span>
            <span class="right-text" id="s2-heading">0*</span>
        </p>
        <p class="s2-pitch">
            <span class="left-text">Pitch</span>
            <span class="right-text" id="s2-pitch">0*</span>
        </p>
        <p class="s2-gforce">
            <span class="left-text">Gforce</span>
            <span class="right-text" id="s2-gforce">0 g</span>
        </p>
    </div>
    <div class="s2-telemetry-state">
        <p class="s2-state">
            <span class="left-text">State</span>
            <span class="right-text" id="s2-state">TBD</span>
        </p>
    </div>
</div>

<script>

async function updateTelemetry() {

    const response = await fetch("/telemetry");
    const data = await response.json();

    document.getElementById("s1-altitude").textContent =
        data.altitude.toFixed(0) + " m";

    document.getElementById("s1-heading").textContent =
        data.heading.toFixed(3) + "*";

    document.getElementById("s1-pitch").textContent =
        data.pitch.toFixed(3) + "*";

    document.getElementById("s1-gforce").textContent =
        data.gforce.toFixed(6) + " g";
}

 setInterval(updateTelemetry, 10);

async function updateEngineTelemetry() {

    const response = await fetch("/telemetry");
    const data = await response.json();

    element = document.getElementById("1");
    if (data.s1e1 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e1 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }

    element = document.getElementById("2");
    if (data.s1e2 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e2 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }

    element = document.getElementById("3");
    if (data.s1e3 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e3 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }

    element = document.getElementById("4");
    if (data.s1e4 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e4 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }

    element = document.getElementById("5");
    if (data.s1e5 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e5 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }

    element = document.getElementById("6");
    if (data.s1e6 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e6 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }

    element = document.getElementById("7");
    if (data.s1e7 == true && !element.classList.contains('engine-on')) {
        element.classList.add('engine-on');
    }
    else if (data.s1e7 == false && element.classList.contains('engine-on')) {
        element.classList.remove('engine-on');
    }
}

setInterval(updateEngineTelemetry, 1000);

// Run immediately on page load
    updateTelemetry();
    updateEngineTelemetry();

async function runSlideDownAnimation() {
    const elements = document.querySelectorAll('.slide-down');

    elements.forEach(element => {
        element.classList.add('slide-down-animation');
    });
}

async function runFadeInAnimation() {
    const elements = document.querySelectorAll('.fade-in');

    elements.forEach(element => {
        element.classList.add('fade-in-animation');
    });
}

if ("{{ animate }}" == "True") {
    runSlideDownAnimation();
    runFadeInAnimation();
}

</script>

</body>
</html>
